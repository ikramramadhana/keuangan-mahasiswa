<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Aplikasi pengelola keuangan mahasiswa - Catat pemasukan dan pengeluaran dengan mudah" />
  <title>Keuangan Mahasiswa - Smart Money Manager</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
  
  <!-- Icons -->
  <link rel="apple-touch-icon" href="icon-192.png" />
  
  <!-- Tailwind via CDN (untuk prototyping cepat) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js for grafik -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --lux-navy: #0b1120;
      --lux-gold: #d4af37;
      --lux-panel: rgba(11, 17, 32, 0.6);
      --lux-stroke: rgba(255, 255, 255, 0.18);
      --lux-soft: rgba(229, 236, 255, 0.75);
    }

    * {
      font-family: 'Manrope', sans-serif;
    }
    
    /* Mobile-first design */
    body {
      touch-action: pan-y;
      -webkit-tap-highlight-color: transparent;
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
    }
    
    .gradient-bg {
      position: relative;
      background:
        radial-gradient(circle at 18% 14%, rgba(212, 175, 55, 0.22) 0%, rgba(212, 175, 55, 0) 42%),
        radial-gradient(circle at 88% 6%, rgba(92, 127, 255, 0.34) 0%, rgba(92, 127, 255, 0) 36%),
        linear-gradient(140deg, #0b1120 0%, #131f3b 58%, #1d2b52 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .gradient-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 34px 34px;
      pointer-events: none;
    }

    .ambient {
      position: absolute;
      border-radius: 999px;
      filter: blur(40px);
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
    }

    .ambient-one {
      width: 300px;
      height: 300px;
      top: -90px;
      right: -50px;
      background: rgba(212, 175, 55, 0.35);
    }

    .ambient-two {
      width: 320px;
      height: 320px;
      bottom: -100px;
      left: -80px;
      background: rgba(82, 122, 255, 0.4);
    }

    .auth-shell {
      background: linear-gradient(155deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.04) 100%);
      border: 1px solid var(--lux-stroke);
      box-shadow: 0 28px 80px rgba(1, 4, 12, 0.45);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      position: relative;
      z-index: 1;
      animation: cinematicIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .auth-shell::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(120deg, rgba(212, 175, 55, 0.5), rgba(255, 255, 255, 0.07), rgba(82, 122, 255, 0.45));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      animation: borderSweep 7s linear infinite;
    }

    .brand-title {
      font-family: 'Playfair Display', serif;
      letter-spacing: 0.3px;
    }

    .brand-subtitle {
      color: rgba(229, 236, 255, 0.78);
    }

    .brand-chip {
      box-shadow: 0 10px 35px rgba(212, 175, 55, 0.35);
      animation: floatPulse 4.2s ease-in-out infinite;
    }

    .reveal-item {
      opacity: 1;
      transform: none;
      animation: revealUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      animation-delay: var(--d, 0s);
    }

    .panel-pop {
      animation: panelPop 0.35s ease-out;
    }

    .mini-pill {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: rgba(233, 240, 255, 0.92);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .auth-note {
      color: rgba(229, 236, 255, 0.84);
    }

    .auth-panel {
      background: var(--lux-panel);
      border: 1px solid var(--lux-stroke);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .field-input {
      border: 1px solid rgba(229, 236, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
      color: #f8fbff;
    }

    .field-input::placeholder {
      color: rgba(229, 236, 255, 0.52);
    }

    .field-icon {
      color: rgba(229, 236, 255, 0.52);
    }

    .switch-track {
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(229, 236, 255, 0.16);
      backdrop-filter: blur(8px);
    }

    .switch-btn-inactive {
      color: rgba(229, 236, 255, 0.6);
    }

    .heading-light {
      color: #f5f8ff;
    }

    .panel-copy {
      color: rgba(229, 236, 255, 0.74);
    }

    .btn-lux-login {
      background: linear-gradient(95deg, #6e8fff 0%, #4f6dff 55%, #3957ea 100%);
      box-shadow: 0 12px 28px rgba(79, 109, 255, 0.35);
    }

    .btn-lux-register {
      background: linear-gradient(95deg, #e2bf52 0%, #d4af37 55%, #b9931f 100%);
      color: #1b1b1b;
      box-shadow: 0 12px 28px rgba(212, 175, 55, 0.35);
    }
    
    .card-hover {
      transition: all 0.3s ease;
    }
    
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.55);
    }
    
    .input-focus {
      transition: all 0.3s ease;
    }
    
    .input-focus:focus {
      transform: translateY(-1px);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.22), 0 8px 18px rgba(0, 0, 0, 0.25);
      border-color: rgba(212, 175, 55, 0.8);
    }
    
    .btn-animate {
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .btn-animate:active {
      transform: scale(0.95);
    }

    @keyframes cinematicIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes revealUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes panelPop {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.995);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes floatPulse {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes borderSweep {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    @keyframes ambientDrift {
      from { transform: translate(0, 0); }
      to { transform: translate(14px, -10px); }
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .fade-in {
      animation: fadeIn 0.5s ease-out;
    }
    
    .stat-card {
      position: relative;
      overflow: hidden;
    }
    
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2);
    }
    
    /* Custom scrollbar for mobile */
    ::-webkit-scrollbar {
      width: 4px;
    }
    
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 10px;
    }
    
    /* Mobile optimizations */
    @media (max-width: 768px) {
      .mobile-padding {
        padding: 1rem !important;
      }
      
      .mobile-text-sm {
        font-size: 0.875rem !important;
      }
      
      .mobile-hidden {
        display: none !important;
      }

      .auth-shell {
        border-radius: 1.25rem;
      }
    }
    
    /* Safe area for notched devices */
    @supports (padding: max(0px)) {
      body {
        padding-left: max(0px, env(safe-area-inset-left));
        padding-right: max(0px, env(safe-area-inset-right));
      }
    }
    
    /* Bottom navigation spacing for mobile */
    .mobile-bottom-space {
      padding-bottom: max(1rem, env(safe-area-inset-bottom));
    }

    .auth-view {
      transition: opacity 0.25s ease, transform 0.25s ease, max-height 0.25s ease;
    }

    .auth-view-hidden {
      display: none;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }

      .reveal-item,
      .panel-pop {
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body class="gradient-bg flex items-start justify-center p-2 sm:p-4">

  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <div class="w-full max-w-3xl rounded-2xl overflow-hidden fade-in mx-auto auth-shell">
    <div id="auth-section" class="p-4 sm:p-8">
      <!-- Header Auth -->
      <div class="text-center mb-6 sm:mb-8 reveal-item" style="--d: 0.06s;">
        <div class="inline-block p-3 sm:p-4 bg-gradient-to-r from-amber-400 to-yellow-500 rounded-full mb-3 sm:mb-4 brand-chip">
          <i class="fas fa-wallet text-white text-3xl sm:text-4xl"></i>
        </div>
        <h1 class="text-3xl sm:text-4xl font-bold heading-light mb-2 brand-title">Smart Money Manager</h1>
        <p class="text-sm sm:text-base brand-subtitle">Kelola keuangan mahasiswa dengan gaya modern dan premium</p>
        <div class="mt-4 flex items-center justify-center gap-2 flex-wrap">
          <span class="mini-pill text-xs font-semibold px-3 py-1 rounded-full"><i class="fas fa-shield-alt mr-1"></i>Aman</span>
          <span class="mini-pill text-xs font-semibold px-3 py-1 rounded-full"><i class="fas fa-bolt mr-1"></i>Realtime</span>
          <span class="mini-pill text-xs font-semibold px-3 py-1 rounded-full"><i class="fas fa-mobile-alt mr-1"></i>Mobile Friendly</span>
        </div>
      </div>
      <div class="flex justify-center mb-5 sm:mb-8 reveal-item" style="--d: 0.14s;">
        <div class="inline-flex rounded-full p-1 shadow-sm switch-track">
          <button id="showLogin" class="auth-switch px-4 sm:px-6 py-2 rounded-full text-sm sm:text-base font-semibold bg-white text-blue-600 shadow-sm">
            Masuk
          </button>
          <button id="showRegister" class="auth-switch px-4 sm:px-6 py-2 rounded-full text-sm sm:text-base font-semibold switch-btn-inactive">
            Daftar
          </button>
        </div>
      </div>

      <div id="authModeNote" class="text-center text-sm sm:text-base font-medium auth-note mb-4 sm:mb-6 reveal-item" style="--d: 0.2s;"></div>

      <div class="max-w-xl mx-auto space-y-4 sm:space-y-6">
        <!-- Login Card -->
        <div id="loginPanel" class="auth-view auth-panel p-4 sm:p-6 rounded-xl card-hover reveal-item" style="--d: 0.28s;">
          <div class="flex items-center mb-3 sm:mb-4">
            <div class="p-2 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-lg mr-2 sm:mr-3">
              <i class="fas fa-sign-in-alt text-white text-sm sm:text-base"></i>
            </div>
            <h2 class="text-xl sm:text-2xl font-bold heading-light">Masuk</h2>
          </div>
          <p class="text-xs sm:text-sm panel-copy mb-3 sm:mb-4">Sudah punya akun? Silakan login di sini</p>
          
          <div class="relative mb-2 sm:mb-3">
            <i class="fas fa-envelope absolute left-3 top-3 sm:top-3.5 text-sm field-icon"></i>
            <input id="loginEmail" placeholder="Email" type="email"
              class="w-full pl-9 sm:pl-10 pr-3 sm:pr-4 py-2.5 sm:py-3 text-sm sm:text-base rounded-lg input-focus focus:outline-none field-input" />
          </div>
          
          <div class="relative mb-3 sm:mb-4">
            <i class="fas fa-lock absolute left-3 top-3 sm:top-3.5 text-sm field-icon"></i>
            <input id="loginPassword" type="password" placeholder="Password" 
              class="w-full pl-9 sm:pl-10 pr-3 sm:pr-4 py-2.5 sm:py-3 text-sm sm:text-base rounded-lg input-focus focus:outline-none field-input" />
          </div>
          
          <button id="btnLogin" 
            class="w-full text-white py-2.5 sm:py-3 rounded-lg font-semibold btn-animate btn-lux-login text-sm sm:text-base">
            <i class="fas fa-sign-in-alt mr-2"></i>Masuk
          </button>

          <button id="jumpToRegister" class="w-full mt-3 text-sm font-semibold text-amber-300 hover:text-amber-200">
            Belum punya akun? Daftar di sini
          </button>
        </div>

        <!-- Register Card -->
        <div id="registerPanel" class="auth-view auth-view-hidden auth-panel p-4 sm:p-6 rounded-xl card-hover reveal-item" style="--d: 0.28s;">
          <div class="flex items-center mb-3 sm:mb-4">
            <div class="p-2 bg-gradient-to-r from-amber-400 to-yellow-500 rounded-lg mr-2 sm:mr-3">
              <i class="fas fa-user-plus text-white text-sm sm:text-base"></i>
            </div>
            <h2 class="text-xl sm:text-2xl font-bold heading-light">Daftar Akun</h2>
          </div>
          <p class="text-xs sm:text-sm panel-copy mb-3 sm:mb-4">Buat akun baru untuk mulai mengelola keuangan</p>
          
          <div class="relative mb-2 sm:mb-3">
            <i class="fas fa-envelope absolute left-3 top-3 sm:top-3.5 text-sm field-icon"></i>
            <input id="regEmail" placeholder="Email" type="email"
              class="w-full pl-9 sm:pl-10 pr-3 sm:pr-4 py-2.5 sm:py-3 text-sm sm:text-base rounded-lg input-focus focus:outline-none field-input" />
          </div>
          
          <div class="relative mb-3 sm:mb-4">
            <i class="fas fa-lock absolute left-3 top-3 sm:top-3.5 text-sm field-icon"></i>
            <input id="regPassword" type="password" placeholder="Password" 
              class="w-full pl-9 sm:pl-10 pr-3 sm:pr-4 py-2.5 sm:py-3 text-sm sm:text-base rounded-lg input-focus focus:outline-none field-input" />
          </div>
          
          <button id="btnRegister" 
            class="w-full py-2.5 sm:py-3 rounded-lg font-semibold btn-animate btn-lux-register text-sm sm:text-base">
            <i class="fas fa-user-plus mr-2"></i>Daftar Sekarang
          </button>

          <button id="jumpToLogin" class="w-full mt-3 text-sm font-semibold text-blue-200 hover:text-white">
            Sudah punya akun? Kembali ke masuk
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <!-- Firebase + App scripts -->
  <script type="module" src="./firebase.js"></script>
  <script type="module" src="./app.js"></script>
  
  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => console.log('SW registered:', registration))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
